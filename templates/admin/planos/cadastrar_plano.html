{% extends 'base/base_admin.html' %}

{% block title %}
Cadastrar Plano
{% endblock %}

{% block content %}

<div class="topbar">

    <h1>
        Novo Plano
    </h1>

    <p>
        Cadastre um novo plano para disponibilizar aos alunos
    </p>

</div>

<div class="form-container">

    <form method="POST">

        <label>
            Nome do Plano
        </label>

        <input
            type="text"
            name="nome"
            placeholder="Ex: Liberdade Total"
            required
        >

        <label>
            Categoria
        </label>

        <select
            name="categoria"
            required
        >

            <option value="">
                Selecione uma categoria
            </option>

            <option value="Básico">
                Básico
            </option>

            <option value="Semi Personal">
                Semi Personal
            </option>

            <option value="Personal Training">
                Personal Training
            </option>

            <option value="Avulso">
                Avulso
            </option>

        </select>

        <label>
            Horário de Acesso
        </label>

        <input
            type="text"
            name="horario"
            placeholder="Ex: 05:00 às 00:00"
            required
        >

        <label>
            Valor (R$)
        </label>

        <input
            type="number"
            step="0.01"
            min="0"
            name="valor"
            placeholder="139.90"
            required
        >

        <label>
            Benefícios do Plano
        </label>

        <textarea
            name="beneficios"
            placeholder="Ex:

• Musculação completa
• Avaliação física
• Acesso livre aos equipamentos
• Aulas coletivas"
            required
        ></textarea>

        <label>
            Status Inicial
        </label>

        <select
            name="status"
            required
        >

            <option value="Disponível">
                Disponível
            </option>

            <option value="Indisponível">
                Indisponível
            </option>

        </select>

        <button type="submit">

            Salvar Plano

        </button>

    </form>

    <a
        href="/planos"
        class="voltar"
    >

        Cancelar e Voltar

    </a>

</div>

{% endblock %}
