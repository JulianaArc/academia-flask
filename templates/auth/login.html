<!DOCTYPE html>
<html lang="pt-BR">

<head>

    <meta charset="UTF-8">

    <title>Login - Academia</title>

    <link
    rel="stylesheet"
    href="{{ url_for('static', filename='css/style.css') }}">

</head>

<body class="login-page">

    <div class="login-container">

        <h1>Sistema Academia</h1>

        <p class="login-subtitle">
            Faça login para continuar
        </p>

        {% with messages = get_flashed_messages() %}

            {% if messages %}

                <div class="erro">

                    {{ messages[0] }}

                </div>

            {% endif %}

        {% endwith %}

        <form method="POST">

            <input
            type="text"
            name="cpf"
            placeholder="CPF"
            autocomplete="username"
            required>

            <input
            type="password"
            name="senha"
            placeholder="Senha"
            autocomplete="current-password"
            required>

            <button type="submit">

                Entrar

            </button>

        </form>

    </div>

</body>

</html>
